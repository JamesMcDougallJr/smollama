node:
  name: "pi-living-room"

ollama:
  host: "localhost"
  port: 11434
  model: "gemma4:e2b"
  keep_alive: "-1"  # keep model in memory indefinitely; use "30m", "1h", or "0" to unload

mqtt:
  broker: "localhost"
  port: 1883
  # Optional auth
  # username: "smollama"
  # password: "secret"
  topics:
    subscribe:
      - "smollama/broadcast"
      - "smollama/pi-living-room/#"
    publish_prefix: "smollama/pi-living-room"

# Plugin system configuration
plugins:
  # Additional directories to scan for plugins
  paths: []  # e.g., ["./my_plugins", "~/.smollama/plugins"]

  # Builtin plugins (GPIO, System)
  builtin:
    gpio:
      enabled: true
      config:
        mock: false  # Set to true for development without Pi hardware
        pins:
          - pin: 17
            name: "motion_sensor"
            mode: "input"
          - pin: 27
            name: "door_switch"
            mode: "input"
    system:
      enabled: true
      config: {}  # System plugin has no configuration
    led:
      enabled: false  # Enable if an LED is wired to a GPIO pin
      config:
        pin: 17          # BCM 17 = Pi Pin 11
        active_high: true  # false if LED is wired between 3.3V and GPIO (active-low)
    dht11:
      enabled: false  # Enable only if DHT11 is physically wired
      config:
        pin: 4               # BCM 4 = Pi Pin 7 (GPIO4)
        min_interval_sec: 2.0  # DHT11 needs ≥1s between reads; 2s recommended
    hcsr04:
      enabled: false  # Enable only if HC-SR04 is physically wired
      config:
        trig_pin: 23   # BCM 23, Pi Pin 16
        echo_pin: 24   # BCM 24, Pi Pin 18 (via voltage divider)
        max_distance: 4.0
        chip: 0
    sh5461as:
      enabled: false  # Enable only if SH5461AS display is physically wired
      config:
        digit_pins: [17, 27, 22, 5]           # BCM pins for D1–D4 (left to right)
        segment_pins: {a: 6, b: 13, c: 19, d: 26, e: 21, f: 20, g: 16, dp: 12}
    s5161as:
      enabled: false  # Enable only if 5161AS single-digit display is physically wired
      config:
        segment_pins: {a: 27, b: 22, c: 11, d: 8, e: 10, f: 17, g: 4, dp: 9}
        common_pin: null  # BCM pin for common cathode, or null if tied directly to GND
    lcd1602:
      enabled: false  # Enable only if 1602A LCD with I2C backpack is connected
      config:
        i2c_address: 0x27  # Use 0x3F for PCF8574A backpacks; run `i2cdetect -y 1` to check
        i2c_port: 1        # I2C bus number (1 on all modern Pi)
        cols: 16
        rows: 2
        backlight: true

  # Custom plugins (installed via `smollama plugin install`)
  custom: []
    # Example custom plugin:
    # - name: bme280
    #   enabled: true
    #   config:
    #     bus: 1
    #     address: 0x76

# Legacy GPIO config (deprecated - use plugins.builtin.gpio instead)
# Kept for backward compatibility
gpio:
  mock: false
  pins:
    - pin: 17
      name: "motion_sensor"
      mode: "input"
    - pin: 27
      name: "door_switch"
      mode: "input"

agent:
  system_prompt: |
    You are a home automation assistant running on a Raspberry Pi.
    You can read GPIO sensors and communicate with other nodes via MQTT.

    When you receive messages, respond helpfully and use your tools when needed:
    - Use read_gpio to check sensor states
    - Use list_gpio to see all available sensors
    - Use publish to send messages to other nodes
    - Use get_recent_messages to see message history

    Be concise in your responses since you're running on limited hardware.

  # Maximum number of tool call iterations before stopping
  max_tool_iterations: 10

  # Ollama retry configuration for graceful degradation
  ollama_retry_attempts: 3  # Number of retry attempts on Ollama failure
  ollama_retry_backoff_seconds: 2.0  # Initial backoff delay (exponential)
  ollama_fallback_mode: "skip"  # "skip" = continue without LLM, "queue" = queue for later

# Memory system configuration
memory:
  db_path: "~/.smollama/memory.db"
  embedding_provider: "ollama"
  embedding_model: "all-minilm:l6-v2"
  observation_enabled: true
  observation_interval_minutes: 15
  observation_lookback_minutes: 60
  sensor_log_retention_days: 90
  observation_max_age_days: 3    # delete observations older than this on each loop tick
  readings_max_age_days: 7       # delete readings older than this on each loop tick
  compact_memory_threshold_mb: 200  # compact old observations when free RAM drops below this
  compact_batch_size: 20         # number of observations to summarize per compaction run

# CRDT sync configuration (for multi-node setups)
sync:
  enabled: true
  llama_url: ""  # URL of the Llama master node for syncing
  sync_interval_minutes: 5
  crdt_db_path: "~/.smollama/sync.db"

# Mem0 semantic memory layer (Llama node only)
# Provides cross-node semantic search via mem0 + Qdrant
mem0:
  enabled: false  # Enable on Llama (master) node
  server_url: "http://localhost:8050"
  bridge_enabled: false  # Only set true on Llama node
  index_observations: true
  index_memories: true
  bridge_interval_seconds: 30
  compose_file: "deploy/mem0/docker-compose.yml"
